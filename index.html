<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>Orçamento Mensal</title>
</head>
<body>
	<div class="card">
		<h1>Orçamento</h1>
	
	<div class="resumo">
		<p>Receitas: <span id="receitas"></span></p>
		<p>Despesas: <span id="despesas"></span></p>	
	    <p>Saldo: <span id="saldo"></span></p>
	</div>

	<input type="text" id="descricao" placeholder="Descrição">
	<input type="number" id="input" placeholder="Valor">

    <div class="button">
		<button class="depositar" onclick="depositar()">Adicionar</button>
		<button class="sacar" onclick="sacar()">Subtrair</button>
		<button class="apagar" onclick="reset()">Limpar</button>
	</div>
	<h2>Movimentos</h2>
	<ul id="movimentos"></ul>
 </div>
	<script src="index.js"></script>
</body>
</html>
